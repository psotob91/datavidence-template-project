# git-cliff configuration — Conventional Commits -> Keep a Changelog.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# Header rendered once at the top of CHANGELOG.md.
header = """
# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

> Generated by git-cliff; do not edit by hand.

"""
# Body template applied per release.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Map Conventional Commit types to Keep a Changelog groups.
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Tests" },
  { message = "^chore", group = "Chore" },
  { message = "^perf", group = "Performance" },
  { message = "^ci", group = "Chore" },
  { message = "^build", group = "Chore" },
  { message = ".*", group = "Chore" },
]
filter_commits = false
# Only tags shaped like v1.2.3 mark releases.
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
