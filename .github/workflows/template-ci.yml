# Template CI — render-test.
#
# This workflow does NOT test a generated project. It tests THIS template repo:
# it renders the template once per analysis_stack into a temp directory, then
# runs the project's own placeholder guard (scripts/check_placeholders.py)
# against each rendered output. The build fails if any render fails or if
# check_placeholders.py reports leaked / unrendered Copier placeholders.
#
# Copier is PINNED via requirements-ci.txt (single source of truth) so a new
# Copier major can't silently change `copier copy --defaults --data key=value`
# behavior and break this build. Dependabot (.github/dependabot.yml) opens a PR
# when a newer Copier is released; this same render-test gates that PR, so a
# breaking flag change surfaces as a failing check instead of a surprise.

name: template-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render-test:
    name: Render template for each analysis stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install Copier (pinned via requirements-ci.txt)
        run: |
          uv venv /tmp/cvenv
          VIRTUAL_ENV=/tmp/cvenv uv pip install -r requirements-ci.txt
          echo "/tmp/cvenv/bin" >> "$GITHUB_PATH"

      - name: Render R stack
        run: >-
          copier copy --defaults
          --data project_name=Smoke
          --data analysis_stack=r
          . /tmp/out-r

      - name: Render Python stack
        run: >-
          copier copy --defaults
          --data project_name=Smoke
          --data analysis_stack=python
          . /tmp/out-python

      - name: Render none stack
        run: >-
          copier copy --defaults
          --data project_name=Smoke
          --data analysis_stack=none
          . /tmp/out-none

      - name: Check placeholders (R stack)
        run: python /tmp/out-r/scripts/check_placeholders.py /tmp/out-r

      - name: Check placeholders (Python stack)
        run: python /tmp/out-python/scripts/check_placeholders.py /tmp/out-python

      - name: Check placeholders (none stack)
        run: python /tmp/out-none/scripts/check_placeholders.py /tmp/out-none
