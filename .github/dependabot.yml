# Dependabot for the TEMPLATE repo itself (not generated projects).
# - pip: bumps the pinned Copier in requirements-ci.txt; the render-test gates the PR.
# - github-actions: keeps the CI action versions current.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "chore(ci)"
